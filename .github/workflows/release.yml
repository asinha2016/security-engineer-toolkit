name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-to-release-branch:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Validate source
        run: bash scripts/validate.sh

      - name: Build into staging dir outside working tree
        run: |
          STAGING=$(mktemp -d)
          bash scripts/build.sh
          cp -R dist/* "$STAGING/"
          echo "STAGING=$STAGING" >> "$GITHUB_ENV"

      - name: Switch to release branch and publish
        run: |
          git checkout release
          git rm -rf .
          cp -R "$STAGING"/. .
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): publish $GITHUB_SHA"
          git push origin release

      - name: Smoke test — plugins array must be non-empty
        run: jq -e '.plugins | length > 0' .claude-plugin/marketplace.json
